version: 2

sources:
  - name: shopstream_raw
    database: shopstream
    schema: raw

    freshness:
      warn_after: {count: 6, period: hour}
      error_after: {count: 24, period: hour}

    tables:
      - name: orders
        loaded_at_field: updated_at
        description: "Raw orders from transactional DB CDC"
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: status
            description: "{{ doc('order_status') }}"
            tests:
              - accepted_values:
                  values: [placed, shipped, delivered, cancelled]

      - name: customers
        loaded_at_field: updated_at
        description: "Raw customers from transactional DB CDC"
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique
              - not_null_proportion:
                  threshold: 0.95
                  config:
                    severity: warn

      - name: order_items
        loaded_at_field: created_at
        description: "Raw order items from transactional DB CDC"
        columns:
          - name: order_item_id
            tests:
              - not_null
              - unique

          - name: order_id
            tests:
              - not_null

          - name: product_id
            tests:
              - not_null

          - name: unit_price
            tests:
              - not_null

      - name: products
        loaded_at_field: updated_at
        description: "Raw products from transactional DB CDC"
        columns:
          - name: product_id
            tests:
              - not_null
              - unique

          - name: price
            tests:
              - not_null

      - name: events
        loaded_at_field: event_at
        description: "Raw events from event tracking system"
        columns:
          - name: event_id
            tests:
              - not_null
              - unique

          - name: event_type
            tests:
              - not_null

          - name: event_at
            tests:
              - not_null